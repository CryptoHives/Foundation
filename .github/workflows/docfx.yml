# Your GitHub workflow for DocFX documentation deployment

name: DocFX Deployment

# Trigger the action on push to main
on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
# Shares the "pages" group with benchmarks.yml to prevent concurrent gh-pages branch writes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Dotnet Setup
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.x
    - run: dotnet tool update -g docfx
    - run: docfx docfx/docfx.json
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docfx/_site
        # Preserve other content on gh-pages (benchmark data under dev/bench/)
        keep_files: true
