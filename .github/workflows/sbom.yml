# Software Bill of Materials (SBOM) Generation
# Generates SPDX SBOM for supply chain transparency

name: Generate SBOM

# The SBOM is only attached to releases, so regenerate it on release (and on demand).
# Building it on every push to main produced an SBOM that was never uploaded.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Restore dependencies
        run: dotnet restore "CryptoHives .NET Foundation.sln"

      - name: Build
        run: dotnet build "CryptoHives .NET Foundation.sln" --configuration Release --no-restore

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          artifact-name: sbom-cryptohives-foundation.spdx.json
          output-file: sbom.spdx.json
          format: spdx-json

      - name: Upload SBOM to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: sbom.spdx.json
